name: FailSift Demo

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: Failure format to demonstrate
        type: choice
        required: true
        default: typescript
        options:
          - typescript
          - pytest
          - go
          - rust

permissions:
  contents: read

jobs:
  controlled-failure:
    runs-on: ubuntu-latest
    steps:
      - name: Emit a TypeScript failure
        if: inputs.scenario == 'typescript'
        shell: bash
        run: |
          echo "src/config.ts(18,7): error TS2322: Type 'string' is not assignable to type 'number'."
          exit 1
      - name: Emit a pytest failure
        if: inputs.scenario == 'pytest'
        shell: bash
        run: |
          echo "FAILED tests/test_orders.py::test_create_order - AssertionError: expected 201, received 500"
          exit 1
      - name: Emit a Go failure
        if: inputs.scenario == 'go'
        shell: bash
        run: |
          echo "internal/total/calculate.go:27:14: cannot use subtotal (variable of type string) as int value in return statement"
          exit 1
      - name: Emit a Rust failure
        if: inputs.scenario == 'rust'
        shell: bash
        run: |
          printf '%s\n' "error[E0308]: mismatched types" "  --> src/config.rs:18:9"
          exit 1
