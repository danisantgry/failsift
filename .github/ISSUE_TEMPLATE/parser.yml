name: Parser request
description: Request support for a CI tool or failure format.
title: "[Parser]: "
labels: [parser, enhancement]
body:
  - type: input
    id: tool
    attributes:
      label: Tool and version
      placeholder: cargo 1.x, go test 1.x, pytest 9.x
    validations:
      required: true
  - type: textarea
    id: root-cause
    attributes:
      label: What should be selected as the root cause?
    validations:
      required: true
  - type: textarea
    id: excerpt
    attributes:
      label: Fully anonymized minimal log excerpt
      render: text
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I checked the excerpt for secrets and personal or private data.
          required: true
